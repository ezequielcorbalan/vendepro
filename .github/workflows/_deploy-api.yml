# trigger: 2026-04-15
name: _deploy-api (reusable)

on:
  workflow_call:
    inputs:
      api_name:
        description: "Package name, e.g. api-auth"
        type: string
        required: true
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vendepro-backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: vendepro-backend

      - name: Run all tests
        # --concurrency=1: evita flake de miniflare al correr varios paquetes en
        # paralelo. Los tests pasan individualmente; el throughput agregado es ~30-40s.
        run: npx turbo run test --concurrency=1
        working-directory: vendepro-backend
        env:
          CI: true

  deploy:
    name: Deploy ${{ inputs.api_name }}
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vendepro-backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: vendepro-backend

      - name: Deploy
        run: npx wrangler deploy
        working-directory: vendepro-backend/packages/${{ inputs.api_name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
