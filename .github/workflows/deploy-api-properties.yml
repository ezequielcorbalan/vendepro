name: Deploy api-properties

on:
  push:
    branches: [main]
    paths:
      - "vendepro-backend/packages/api-properties/**"
      - "vendepro-backend/packages/core/**"
      - "vendepro-backend/packages/infrastructure/**"
      - "vendepro-backend/package.json"
      - "vendepro-backend/package-lock.json"
      - ".github/workflows/deploy-api-properties.yml"
      - ".github/workflows/_deploy-api.yml"
  workflow_dispatch:

concurrency:
  group: deploy-api-properties
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-api.yml
    with:
      api_name: api-properties
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
