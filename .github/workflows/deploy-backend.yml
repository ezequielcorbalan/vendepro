name: Deploy Backend APIs

on:
  push:
    branches: [main]
    paths:
      - 'reportes-backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

# Prevent concurrent deploys — never cancel an in-flight deploy
concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  # ── Job 1: Tests must pass before any deploy ─────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: reportes-backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: reportes-backend

      - name: Run all tests
        run: npm test
        working-directory: reportes-backend
        env:
          CI: true

  # ── Job 2: Deploy all 8 APIs (only runs if tests pass) ───────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: reportes-backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: reportes-backend

      - name: Deploy api-auth
        run: npx wrangler deploy
        working-directory: reportes-backend/packages/api-auth
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy api-crm
        run: npx wrangler deploy
        working-directory: reportes-backend/packages/api-crm
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy api-properties
        run: npx wrangler deploy
        working-directory: reportes-backend/packages/api-properties
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy api-transactions
        run: npx wrangler deploy
        working-directory: reportes-backend/packages/api-transactions
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy api-analytics
        run: npx wrangler deploy
        working-directory: reportes-backend/packages/api-analytics
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy api-ai
        run: npx wrangler deploy
        working-directory: reportes-backend/packages/api-ai
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy api-admin
        run: npx wrangler deploy
        working-directory: reportes-backend/packages/api-admin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy api-public
        run: npx wrangler deploy
        working-directory: reportes-backend/packages/api-public
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
